# OSS 对象存储
oss:
  endpoint: ${OSS_ENDPOINT:http://localhost:9000}
  access-key: ${OSS_ACCESS_KEY:minioadmin}
  secret-key: ${OSS_SECRET_KEY:minioadmin}
  bucket: ${OSS_BUCKET:campustrade}

# H2 文件数据库（持久化）
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/campus_trade;MODE=MySQL;AUTO_RECONNECT=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
